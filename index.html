<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwriting & Plotter SVG Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
    <style>
        :root {
            --bg: #1e1e2e; --panel: #282a36; --text: #f8f8f2;
            --accent: #bd93f9; --canvas: #ffffff; --border: #44475a;
            --highlight: #50fa7b;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; overflow: hidden; }
        #sidebar { width: 420px; background-color: var(--panel); padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        h2 { margin-top: 0; color: var(--accent); font-size: 1.5rem; margin-bottom: 5px; }
        
        .control-group { display: flex; flex-direction: column; gap: 5px; background: #323443; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .row { display: flex; justify-content: space-between; align-items: center; }
        label { font-size: 0.85rem; font-weight: bold; color: #ffb86c; }
        .val-display { font-weight: normal; color: #8be9fd; }
        input[type="range"] { width: 100%; cursor: pointer; }
        textarea, select, input[type="number"] { padding: 8px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; font-family: monospace; }
        select { flex-grow: 1; }
        textarea { width: 100%; resize: vertical; }
        
        #textBlocksList { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .text-block-card { background: #44475a; padding: 10px; border-radius: 6px; display: flex; flex-direction: column; gap: 8px; border-left: 4px solid transparent; cursor: pointer; transition: border-color 0.2s; }
        .text-block-card:hover { border-color: #6272a4; }
        .text-block-card.active { border-color: var(--highlight); background: #3b3e4f; }
        .coord-inputs { display: flex; gap: 10px; align-items: center; }
        .coord-inputs label { display: flex; align-items: center; gap: 5px; color: #f8f8f2; }
        .coord-inputs input { width: 70px; padding: 4px; }
        
        .btn-small { background: var(--highlight); color: #282a36; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        .btn-danger { background: #ff5555; color: #fff; }
        .btn-large { background-color: var(--accent); color: #000; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: auto; }
        .btn-secondary { background-color: #6272a4; color: #fff; border: none; padding: 8px; border-radius: 5px; font-size: 0.8rem; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        
        #propertiesPanel { display: none; flex-direction: column; gap: 5px; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .toggles-group { display: flex; gap: 15px; font-size: 0.85rem; align-items: center; background: #44475a; padding: 8px; border-radius: 5px; margin-bottom: 5px; }
        
        #canvas-container { flex-grow: 1; padding: 40px; display: flex; justify-content: center; align-items: center; background-color: #12121c; position: relative; }
        svg { background-color: var(--canvas); box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 100%; max-height: 100%; }
        
        /* Drag UI Feedback */
        .text-block-group { cursor: move; }
        .hitbox { fill: transparent; stroke: transparent; transition: stroke 0.2s; }
        .text-block-group:hover .hitbox { stroke: rgba(189, 147, 249, 0.5); stroke-width: 2; stroke-dasharray: 4; }
        .text-block-group.selected .hitbox { stroke: var(--highlight); stroke-width: 2; stroke-dasharray: none; }
        
        #boxDimensions { color: var(--highlight); font-family: monospace; font-size: 0.8rem; text-align: right; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Plotter Controls</h2>
        
        <div class="control-group">
            <div class="row">
                <label>Text Blocks</label>
                <button class="btn-small" id="addBlockBtn">+ Add Box</button>
            </div>
            <div id="textBlocksList"></div>
        </div>

        <div id="propertiesPanel">
            <h3 style="margin: 5px 0; color: #f8f8f2; font-size: 1.1rem;">Selected Box Properties</h3>
            <div id="boxDimensions">Width: 0px | Height: 0px</div>

            <div class="control-group">
                <div class="row"><label>Typeface / Font</label></div>
                <div style="display: flex; gap: 10px;">
                    <select id="fontSelect" onchange="updateProp('font', this.value)">
                        <option value="default">Standard Handwriting</option>
                        <option value="blocky">Architect Block</option>
                    </select>
                </div>
                <button class="btn-secondary" id="loadFontBtn">📥 Manually Upload Font</button>
                <input type="file" id="fontLoader" accept=".json,.ttf,.otf" style="display:none;">
            </div>

            <div class="toggles-group">
                <label><input type="checkbox" id="underline" onchange="updateProp('underline', this.checked)"> Underline</label>
                <label><input type="checkbox" id="strikethrough" onchange="updateProp('strikethrough', this.checked)"> Strike</label>
                <label><input type="checkbox" id="italicsCheck" onchange="updateProp('italics', this.checked)"> Italics</label>
            </div>

            <div class="control-group">
                <div class="row"><label>Rotation</label><span class="val-display" id="rotationVal">0°</span></div>
                <input type="range" id="rotation" min="0" max="360" value="0" oninput="updateProp('rotation', this.value)">
            </div>

            <div class="control-group">
                <div class="row"><label>Size (Scale)</label><span class="val-display" id="sizeVal">1.0</span></div>
                <input type="range" id="size" min="0.1" max="15" step="0.1" value="1.0" oninput="updateProp('size', this.value)">
            </div>

            <div class="control-group">
                <div class="row"><label>Letter Spacing</label><span class="val-display" id="letterSpacingVal">5</span></div>
                <input type="range" id="letterSpacing" min="-10" max="30" value="5" oninput="updateProp('letterSpacing', this.value)">
            </div>

            <div class="control-group">
                <div class="row"><label>Word Spacing</label><span class="val-display" id="wordSpacingVal">20</span></div>
                <input type="range" id="wordSpacing" min="5" max="60" value="20" oninput="updateProp('wordSpacing', this.value)">
            </div>

            <div class="control-group">
                <div class="row"><label>Line Height</label><span class="val-display" id="lineHeightVal">40</span></div>
                <input type="range" id="lineHeight" min="20" max="100" value="40" oninput="updateProp('lineHeight', this.value)">
            </div>

            <div class="control-group">
                <div class="row"><label>Handwriting Randomness</label><span class="val-display" id="randomVal">0</span></div>
                <input type="range" id="randomness" min="0" max="10" step="0.5" value="0" oninput="updateProp('randomness', this.value)">
            </div>

            <div class="control-group">
                <div class="row"><label>Baseline Wobble (Y)</label><span class="val-display" id="wobbleVal">0</span></div>
                <input type="range" id="wobble" min="0" max="15" step="0.5" value="0" oninput="updateProp('wobble', this.value)">
            </div>

            <div class="control-group">
                <div class="row"><label>Italics Angle</label><span class="val-display" id="slantVal">0°</span></div>
                <input type="range" id="slant" min="-45" max="45" value="0" oninput="updateProp('slant', this.value)">
            </div>
        </div>
        
        <div id="noSelectionMsg" style="color: #6272a4; font-size: 0.9rem; text-align: center; margin-top: 20px;">
            Select a text box on the canvas to edit its properties.
        </div>

        <button class="btn-large" id="exportBtn">Download SVG</button>
    </div>

    <div id="canvas-container">
        <svg id="plotterCanvas" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 850"></svg>
    </div>

    <script>
        // ==========================================
        // GITHUB PORTFOLIO AUTO-LOAD FONTS
        // ==========================================
        // These fonts will automatically load from your /fonts/ directory on page load.
        const hostedFonts = [
            { name: "Quickly Replaced", url: "./fonts/QuicklyReplacedSingleLine-rgZXL.ttf", type: "ttf" },
            { name: "Partly Notes", url: "./fonts/PartlyNotesSingleLine-WyDMz.ttf", type: "ttf" },
            { name: "Hefty Reward", url: "./fonts/HeftyRewardSingleLine-JRqWx.ttf", type: "ttf" },
            { name: "Headstay", url: "./fonts/HeadstayRegular-1GrM2.ttf", type: "ttf" },
            { name: "Gloomy Unseen", url: "./fonts/GloomyUnseenSingleLine-lg37Z.ttf", type: "ttf" },
            { name: "Flighty", url: "./fonts/FlightyRegular-vm7zA.ttf", type: "ttf" },
            { name: "Backstay", url: "./fonts/BackstaySingleLine-rgOw8.ttf", type: "ttf" },
            { name: "Auditory Perception", url: "./fonts/AuditoryPerceptionSingleLine-RpELl.ttf", type: "ttf" },
            { name: "Aplenty", url: "./fonts/AplentyRegular-owWJq.ttf", type: "ttf" }
        ];

        async function loadHostedFonts() {
            for (const fontInfo of hostedFonts) {
                try {
                    const response = await fetch(fontInfo.url);
                    if (!response.ok) throw new Error("Could not fetch " + fontInfo.url);
                    
                    if (fontInfo.type === 'json') {
                        const fontData = await response.json();
                        const fontId = 'hosted_' + Date.now() + Math.random();
                        fonts[fontId] = {
                            characters: fontData.characters,
                            fallback: fontData.fallback || fonts.default.fallback
                        };
                        addFontToDropdown(fontId, fontInfo.name || fontData.name);
                    } else if (fontInfo.type === 'ttf' || fontInfo.type === 'otf') {
                        const buffer = await response.arrayBuffer();
                        const otFont = opentype.parse(buffer);
                        const fontId = 'hosted_' + Date.now() + Math.random();
                        const convertedData = { characters: {}, fallback: fonts.default.fallback };
                        
                        for (let i = 32; i <= 126; i++) {
                            const char = String.fromCharCode(i);
                            const glyph = otFont.charToGlyph(char);
                            const path = glyph.getPath(0, 20, 20);
                            convertedData.characters[char] = { 
                                path: path.toPathData(3), 
                                width: glyph.advanceWidth * (20 / otFont.unitsPerEm) 
                            };
                        }
                        fonts[fontId] = convertedData;
                        addFontToDropdown(fontId, fontInfo.name || otFont.names.fontFamily.en);
                    }
                } catch (err) {
                    console.error("Error auto-loading font:", fontInfo.name, err);
                }
            }
        }

                    'q': {path: "M12,10 L12,30 M12,10 L0,10 L0,20 L12,20", width: 14}, 'r': {path: "M0,10 L0,20 M0,14 L12,10", width: 14},
                    's': {path: "M12,10 L0,10 L0,15 L12,15 L12,20 L0,20", width: 14}, 't': {path: "M6,0 L6,20 M0,10 L12,10", width: 14},
                    'u': {path: "M0,10 L0,20 L12,20 L12,10", width: 14}, 'v': {path: "M0,10 L6,20 L12,10", width: 14},
                    'w': {path: "M0,10 L4,20 L8,14 L12,20 L16,10", width: 18}, 'x': {path: "M0,10 L12,20 M12,10 L0,20", width: 14},
                    'y': {path: "M0,10 L6,20 L12,10 M6,20 L6,28 L0,28", width: 14}, 'z': {path: "M0,10 L12,10 L0,20 L12,20", width: 14}
                },
                fallback: { path: "M0,10 L10,10 M0,20 L10,20 L10,0 L0,0 Z", width: 12 }
            }
        };

        const canvas = document.getElementById('plotterCanvas');
        const textBlocksList = document.getElementById('textBlocksList');
        
        let dragTargetId = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        function addFontToDropdown(fontId, fontName) {
            const opt = document.createElement('option');
            opt.value = fontId;
            opt.innerText = fontName;
            document.getElementById('fontSelect').appendChild(opt);
        }

        // Manual upload logic (still here so users can try fonts before uploading to github!)
        document.getElementById('loadFontBtn').addEventListener('click', () => {
            document.getElementById('fontLoader').click();
        });

        document.getElementById('fontLoader').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const ext = file.name.split('.').pop().toLowerCase();
            const reader = new FileReader();
            
            if (ext === 'json') {
                reader.onload = (event) => {
                    try {
                        const fontData = JSON.parse(event.target.result);
                        if (!fontData.name || !fontData.characters) throw new Error("Invalid JSON");
                        const fontId = 'manual_' + Date.now();
                        fonts[fontId] = { characters: fontData.characters, fallback: fontData.fallback || fonts.default.fallback };
                        addFontToDropdown(fontId, fontData.name);
                        
                        if (selectedBlockId !== null) {
                            document.getElementById('fontSelect').value = fontId;
                            updateProp('font', fontId);
                        }
                    } catch (err) {
                        alert("Error loading JSON font.");
                    }
                    e.target.value = ''; 
                };
                reader.readAsText(file);
            } 
            else if (ext === 'ttf' || ext === 'otf') {
                reader.onload = (event) => {
                    try {
                        const buffer = event.target.result;
                        const otFont = opentype.parse(buffer);
                        const fontId = 'manual_' + Date.now();
                        const fontName = otFont.names.fontFamily ? otFont.names.fontFamily.en : file.name;
                        
                        const convertedData = { characters: {}, fallback: fonts.default.fallback };
                        for (let i = 32; i <= 126; i++) {
                            const char = String.fromCharCode(i);
                            const glyph = otFont.charToGlyph(char);
                            const path = glyph.getPath(0, 20, 20);
                            convertedData.characters[char] = { path: path.toPathData(3), width: glyph.advanceWidth * (20 / otFont.unitsPerEm) };
                        }
                        
                        fonts[fontId] = convertedData;
                        addFontToDropdown(fontId, fontName);
                        
                        if (selectedBlockId !== null) {
                            document.getElementById('fontSelect').value = fontId;
                            updateProp('font', fontId);
                        }
                    } catch(err) {
                        alert("Error parsing TTF/OTF font.");
                    }
                    e.target.value = ''; 
                };
                reader.readAsArrayBuffer(file);
            }
        });

        function renderTextBlocksUI() {
            textBlocksList.innerHTML = '';
            textBlocks.forEach((block, index) => {
                const div = document.createElement('div');
                div.className = `text-block-card ${block.id === selectedBlockId ? 'active' : ''}`;
                div.onclick = (e) => {
                    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'SELECT' && e.target.tagName !== 'BUTTON') {
                        selectBlock(block.id);
                    }
                };
                div.innerHTML = `
                    <div class="row">
                        <strong>Text Box ${index + 1}</strong>
                        ${textBlocks.length > 1 ? `<button class="btn-small btn-danger" onclick="removeBlock(${block.id})">Remove</button>` : ''}
                    </div>
                    <textarea rows="2" oninput="updateBlockData(${block.id}, 'text', this.value)">${block.text}</textarea>
                    <div class="coord-inputs">
                        <label>Align: 
                            <select onchange="updateBlockData(${block.id}, 'align', this.value)">
                                <option value="left" ${block.align === 'left' ? 'selected' : ''}>Left</option>
                                <option value="center" ${block.align === 'center' ? 'selected' : ''}>Center</option>
                                <option value="right" ${block.align === 'right' ? 'selected' : ''}>Right</option>
                            </select>
                        </label>
                        <label>X: <input type="number" id="block-x-${block.id}" value="${block.x}" oninput="updateBlockData(${block.id}, 'x', this.value)"></label>
                        <label>Y: <input type="number" id="block-y-${block.id}" value="${block.y}" oninput="updateBlockData(${block.id}, 'y', this.value)"></label>
                    </div>
                `;
                textBlocksList.appendChild(div);
            });
        }

        function updateBlockData(id, key, value) {
            const block = textBlocks.find(b => b.id === id);
            if (block) {
                block[key] = (key === 'text' || key === 'align') ? value : parseFloat(value) || 0;
                if(selectedBlockId !== id) selectBlock(id);
                renderText();
                updateDimensionsDisplay(block);
            }
        }

        function updateProp(key, value) {
            if (selectedBlockId === null) return;
            const block = textBlocks.find(b => b.id === selectedBlockId);
            if (block) {
                if (key === 'font') {
                    block[key] = value;
                } else {
                    block[key] = (typeof value === 'boolean') ? value : parseFloat(value);
                }
                
                if (key === 'italics') {
                    block.slant = value ? -15 : 0;
                    document.getElementById('slant').value = block.slant;
                    document.getElementById('slantVal').innerText = block.slant + "°";
                }
                if (key === 'slant') {
                    block.italics = (value !== 0);
                    document.getElementById('italicsCheck').checked = block.italics;
                }
                
                if(document.getElementById(key + 'Val')) {
                    let displayVal = value;
                    if(key === 'slant' || key === 'rotation') displayVal += "°";
                    document.getElementById(key + 'Val').innerText = displayVal;
                }
                
                renderText();
                updateDimensionsDisplay(block);
            }
        }

        function selectBlock(id) {
            selectedBlockId = id;
            renderTextBlocksUI();
            
            if (id !== null) {
                const block = textBlocks.find(b => b.id === id);
                document.getElementById('propertiesPanel').style.display = 'flex';
                document.getElementById('noSelectionMsg').style.display = 'none';
                
                document.getElementById('fontSelect').value = block.font;
                ['rotation', 'size', 'letterSpacing', 'wordSpacing', 'lineHeight', 'randomness', 'wobble', 'slant'].forEach(key => {
                    document.getElementById(key).value = block[key];
                    let displayVal = block[key];
                    if(key === 'slant' || key === 'rotation') displayVal += "°";
                    document.getElementById(key + 'Val').innerText = displayVal;
                });
                document.getElementById('underline').checked = block.underline;
                document.getElementById('strikethrough').checked = block.strikethrough;
                document.getElementById('italicsCheck').checked = block.italics;
                
                updateDimensionsDisplay(block);
            } else {
                document.getElementById('propertiesPanel').style.display = 'none';
                document.getElementById('noSelectionMsg').style.display = 'block';
            }
        }

        function updateDimensionsDisplay(block) {
            document.getElementById('boxDimensions').innerText = `Width: ${Math.round(block._width)}px | Height: ${Math.round(block._height)}px`;
        }

        function removeBlock(id) {
            textBlocks = textBlocks.filter(b => b.id !== id);
            if (selectedBlockId === id) {
                const nextId = textBlocks.length > 0 ? textBlocks[0].id : null;
                renderText();
                selectBlock(nextId);
            } else { 
                renderTextBlocksUI(); 
                renderText(); 
            }
        }

        document.getElementById('addBlockBtn').addEventListener('click', () => {
            const newBlock = createDefaultBlock(blockIdCounter++, 300);
            textBlocks.push(newBlock);
            renderText(); 
            selectBlock(newBlock.id);
        });

        function renderText() {
            canvas.innerHTML = ''; 

            textBlocks.forEach(block => {
                const lines = block.text.split('\n');
                let maxBlockWidth = 0;
                const lineMetrics = [];
                const activeFont = fonts[block.font] || fonts.default;

                lines.forEach((line) => {
                    let lineWidth = 0;
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        if (char === ' ') lineWidth += block.wordSpacing;
                        else {
                            const charData = activeFont.characters[char] || activeFont.fallback;
                            lineWidth += charData.width + block.letterSpacing;
                        }
                    }
                    const scaledWidth = lineWidth * block.size;
                    lineMetrics.push({ text: line, scaledWidth: scaledWidth });
                    if (scaledWidth > maxBlockWidth) maxBlockWidth = scaledWidth;
                });

                block._width = maxBlockWidth;
                block._height = lines.length * (block.lineHeight * block.size);

                const groupEl = document.createElementNS("http://www.w3.org/2000/svg", "g");
                groupEl.setAttribute("class", `text-block-group ${block.id === selectedBlockId ? 'selected' : ''}`);
                groupEl.setAttribute("data-id", block.id);
                
                const cx = maxBlockWidth / 2;
                const cy = block._height / 2;
                groupEl.setAttribute("transform", `translate(${block.x}, ${block.y}) rotate(${block.rotation || 0}, ${cx}, ${cy})`);

                const hitbox = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                hitbox.setAttribute("class", "hitbox");
                hitbox.setAttribute("x", -10); 
                hitbox.setAttribute("y", -10);
                hitbox.setAttribute("width", maxBlockWidth + 20);
                hitbox.setAttribute("height", block._height + 10);
                groupEl.appendChild(hitbox);

                let currentY = 0;

                lineMetrics.forEach((lineData) => {
                    let currentX = 0;
                    if (block.align === 'center') currentX += (maxBlockWidth - lineData.scaledWidth) / 2;
                    if (block.align === 'right') currentX += (maxBlockWidth - lineData.scaledWidth);

                    if (block.underline || block.strikethrough) {
                        const lineEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
                        let paths = "";
                        const unscaledWidth = lineData.scaledWidth / block.size;
                        if (block.underline) paths += `M0,22 L${unscaledWidth},22 `; 
                        if (block.strikethrough) paths += `M0,10 L${unscaledWidth},10 `;
                        
                        lineEl.setAttribute("d", paths);
                        lineEl.setAttribute("stroke", "#000");
                        lineEl.setAttribute("stroke-width", 2 / block.size);
                        lineEl.setAttribute("fill", "none");
                        lineEl.setAttribute("transform", `translate(${currentX}, ${currentY}) scale(${block.size}) skewX(${block.slant})`); 
                        groupEl.appendChild(lineEl);
                    }

                    for (let i = 0; i < lineData.text.length; i++) {
                        const char = lineData.text[i];
                        if (char === ' ') {
                            currentX += block.wordSpacing * block.size;
                            continue;
                        }

                        const charData = activeFont.characters[char] || activeFont.fallback;
                        const wobbleY = block.wobble > 0 ? (Math.random() * block.wobble) - (block.wobble / 2) : 0;
                        
                        let randScale = 1;
                        let randRotate = 0;
                        if (block.randomness > 0) {
                            randScale += ((Math.random() * 0.04 * block.randomness) - (0.02 * block.randomness));
                            randRotate = (Math.random() * block.randomness) - (block.randomness / 2); 
                        }

                        if (charData.path !== "") {
                            const pathEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
                            pathEl.setAttribute("d", charData.path);
                            pathEl.setAttribute("stroke", "#000000");
                            pathEl.setAttribute("stroke-width", 2 / block.size);
                            pathEl.setAttribute("fill", "none");
                            pathEl.setAttribute("stroke-linecap", "round");
                            pathEl.setAttribute("stroke-linejoin", "round");

                            pathEl.setAttribute("transform", 
                                `translate(${currentX}, ${currentY + wobbleY}) 
                                 scale(${block.size * randScale}) 
                                 skewX(${block.slant})
                                 rotate(${randRotate})`
                            );
                            groupEl.appendChild(pathEl);
                        }
                        
                        let xAdvance = (charData.width + block.letterSpacing) * block.size;
                        if (block.randomness > 0) xAdvance += (Math.random() * block.randomness * 0.5) - (block.randomness * 0.25);
                        currentX += xAdvance;
                    }
                    currentY += block.lineHeight * block.size;
                });
                
                canvas.appendChild(groupEl);
            });
        }

        function getMousePosition(evt) {
            const pt = canvas.createSVGPoint();
            pt.x = evt.clientX;
            pt.y = evt.clientY;
            return pt.matrixTransform(canvas.getScreenCTM().inverse());
        }

        canvas.addEventListener('mousedown', (e) => {
            const group = e.target.closest('.text-block-group');
            if (group) {
                const id = parseInt(group.getAttribute('data-id'));
                if (selectedBlockId !== id) selectBlock(id);
                
                dragTargetId = id;
                const block = textBlocks.find(b => b.id === dragTargetId);
                const mousePos = getMousePosition(e);
                
                dragOffsetX = mousePos.x - block.x;
                dragOffsetY = mousePos.y - block.y;
            } else {
                if (selectedBlockId !== null) {
                    selectedBlockId = null;
                    renderTextBlocksUI();
                    renderText();
                    document.getElementById('propertiesPanel').style.display = 'none';
                    document.getElementById('noSelectionMsg').style.display = 'block';
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (dragTargetId !== null) {
                const mousePos = getMousePosition(e);
                const block = textBlocks.find(b => b.id === dragTargetId);
                block.x = Math.round(mousePos.x - dragOffsetX);
                block.y = Math.round(mousePos.y - dragOffsetY);
                
                const xInput = document.getElementById(`block-x-${dragTargetId}`);
                const yInput = document.getElementById(`block-y-${dragTargetId}`);
                if (xInput) xInput.value = block.x;
                if (yInput) yInput.value = block.y;
                
                renderText();
            }
        });

        canvas.addEventListener('mouseup', () => { dragTargetId = null; });
        canvas.addEventListener('mouseleave', () => { dragTargetId = null; });

        document.getElementById('exportBtn').addEventListener('click', () => {
            const exportCanvas = canvas.cloneNode(true);
            exportCanvas.querySelectorAll('.hitbox').forEach(el => el.remove());
            const svgData = new XMLSerializer().serializeToString(exportCanvas);
            const blob = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"});
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = "plotter_handwriting.svg";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // Initialize and trigger auto-loading
        loadHostedFonts().then(() => {
            renderTextBlocksUI();
            renderText();
            selectBlock(1);
        });
    </script>
</body>
</html>
